<form>
  <div class="input-group">
    <app-user-input
      [title]="'INITIAL INVESTMENT'"
      [name]="'initial_investment'"
      [data]="investimentData"
      [propertyName]="'initialInvestment'"
    />
    <app-user-input
      [title]="'ANNUAL INVESTMENT'"
      [name]="'annual_investment'"
      [data]="investimentData"
      [propertyName]="'annualInvestment'"
    />
  </div>
  <div class="input-group">
    <app-user-input
      [title]="'EXPECTED RETURN'"
      [name]="'expected_return'"
      [data]="investimentData"
      [propertyName]="'expectedReturn'"
    />
    <app-user-input
      [title]="'DURATION'"
      [name]="'duration'"
      [data]="investimentData"
      [propertyName]="'duration'"
    />
  </div>
  <p>
    <button type="submit" (click)="calculate()">CALCULATE</button>
  </p>
</form>
