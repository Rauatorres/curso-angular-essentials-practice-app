<table>
  <thead>
    <th>Year</th>
    <th>Investiment Value</th>
    <th>Interest (Year)</th>
    <th>Total Interest</th>
    <th>Invested Capital</th>
  </thead>
  <tbody>
    @for (result of results(); track $index) {
      <tr>
        <td>{{ result.year }}</td>
        <td>{{ result.investimentValue | currency }}</td>
        <td>{{ result.yearInterest | currency }}</td>
        <td>{{ result.totalInterest | currency }}</td>
        <td>{{ result.investedCapital | currency }}</td>
      </tr>
    }
  </tbody>
</table>
